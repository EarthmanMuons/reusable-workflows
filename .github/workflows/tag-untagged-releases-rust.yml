name: tag untagged releases / rust

on:
  workflow_call:
    secrets:
      APP_ID:
        description: GitHub App installation ID
        required: true
      APP_PRIVATE_KEY:
        description: GitHub App private key
        required: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  tag_if_missing:
    name: tag if missing
    runs-on: ubuntu-latest
    steps:
      - id: generate_token
        name: Generate a GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: main
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        run: |
          git config user.name "senile-errata[bot]"
          git config user.email "senile-errata@users.noreply.github.com"

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: stable-ubuntu-latest
        timeout-minutes: 5

      - name: Install cargo-release
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: cargo-release

      - name: Capture tags before
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "TAGS_BEFORE<<$EOF"
            git tag --list
            echo "$EOF"
          } >>"$GITHUB_ENV"

      - name: Add any missing tags
        run: cargo release tag -v --execute --no-confirm || true

      - name: Push any new tags
        run: cargo release push -v --execute --no-confirm

      - name: Capture tags after
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "TAGS_AFTER<<$EOF"
            git tag --list
            echo "$EOF"
          } >>"$GITHUB_ENV"

      - name: Annotate workflow run with new tags
        run: |
          NEW_TAGS="$(
            comm -13 \
              <(printf '%s\n' "${TAGS_BEFORE}" | sed '/^$/d' | sort) \
              <(printf '%s\n' "${TAGS_AFTER}" | sed '/^$/d' | sort)
          )"

          if [[ -n "${NEW_TAGS}" ]]; then
            NEW_TAG_COUNT="$(printf '%s\n' "${NEW_TAGS}" | sed '/^$/d' | wc -l | tr -d ' ')"
            if [[ "${NEW_TAG_COUNT}" == "1" ]]; then
              echo "::notice::Created missing tag $(printf '%s\n' "${NEW_TAGS}" | head -n1)."
            else
              echo "::notice::Created ${NEW_TAG_COUNT} missing tags."
            fi

            echo "::group::New tags"
            printf '%s\n' "${NEW_TAGS}"
            echo "::endgroup::"

            {
              echo "### :sparkles: New tags:"
              echo
              printf '%s\n' "${NEW_TAGS}" | sed -e 's/^/- /'
            } >>"$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::No new release tags were needed."
          fi

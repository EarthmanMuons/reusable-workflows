name: check rust / beta

on:
  workflow_call:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  test_beta:
    name: test beta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install beta Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: beta

      - name: Set override to beta Rust
        run: rustup override set beta

      - name: Install cargo-nextest
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20
        with:
          tool: cargo-nextest

      - name: Compile tests
        run: cargo test --locked --no-run

      - name: Run tests
        run: cargo nextest run --locked --all-targets

      - name: Run doctests
        run: cargo test --locked --doc

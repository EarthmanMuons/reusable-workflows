name: check rust / beta

on:
  workflow_call:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  test_beta:
    name: test beta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install beta Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: beta

      - name: Set override to beta Rust
        run: rustup override set beta

      - name: Install cargo-nextest
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5
        with:
          tool: cargo-nextest

      - name: Compile tests
        run: cargo test --locked --no-run

      - name: Run tests
        run: cargo nextest run --locked --all-targets

      - name: Run doctests
        run: cargo test --locked --doc

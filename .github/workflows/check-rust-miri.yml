name: check rust / miri

on:
  workflow_call:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  test_miri:
    name: test miri
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly
          components: miri

      - name: Set override to nightly Rust
        run: rustup override set nightly

      - name: Setup Miri environment
        run: cargo miri setup

      - name: Compile tests with Miri
        run: cargo miri test --no-run

      - name: Run tests with Miri
        run: cargo miri test
